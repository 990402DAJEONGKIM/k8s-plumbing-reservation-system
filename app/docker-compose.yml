version: '3.8'

services:
  # 1. Database (MySQL)
  db:
    image: mysql:8.0
    container_name: plumbing-db
    environment:
      MYSQL_ROOT_PASSWORD: your_password
      MYSQL_DATABASE: plumbing_db
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network

  # 2. Node.js 백엔드 서비스
  backend:
    build: ./backend
    container_name: plumbing-backend
    ports:
      - "4000:4000"
    environment:
      # 💡 K8s 이전 테스트 시에도 유연하게 주입할 수 있도록 변경
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-your_password}
      - DB_NAME=${DB_NAME:-plumbing_db}
    networks:
      - app-network
    depends_on:
      - db

  # 3. 프론트엔드 서비스
  frontend:
    build: ./frontend
    container_name: plumbing-frontend
    # Docker Compose 빌드 시 NEXT_PUBLIC_API_URL을 주입하여 클라이언트 번들에 포함
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000 # 브라우저에서 접근할 주소 (호스트 기준)
    ports:
      - "3000:3000"
    environment:
      # 서버(프론트엔드 컨테이너)에서 백엔드로 접근할 주소 (Docker 네트워크 기준)
      - INTERNAL_API_URL=${INTERNAL_API_URL:-http://backend:4000}
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge