version: '3.8'

services:
  # 1. Database (MySQL)
  db:
    image: mysql:8.0
    container_name: plumbing-db
    environment:
      MYSQL_ROOT_PASSWORD: your_password
      MYSQL_DATABASE: plumbing_db
    ports:
      - "3306:3306"
    networks:
      - app-network

  # 2. Node.js 백엔드 서비스
  backend:
    build: ./backend
    container_name: plumbing-backend
    ports:
      - "4000:4000"
    environment:
      # 💡 K8s 이전 테스트 시에도 유연하게 주입할 수 있도록 변경
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-your_password}
      - DB_NAME=${DB_NAME:-plumbing_db}
    networks:
      - app-network
    depends_on:
      - db

  # 3. 프론트엔드 서비스
  frontend:
    build: ./frontend
    container_name: plumbing-frontend
    ports:
      - "3000:3000"
    environment:
      # 💡 프론트엔드 컨테이너가 바라볼 백엔드 외부 진입점 주소
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge