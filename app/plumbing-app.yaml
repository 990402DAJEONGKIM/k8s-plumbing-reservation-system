# 1. ProxySQL PVC (영구 볼륨)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: proxysql-pvc
spec:
  storageClassName: nfs-client
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
---
# 2. ProxySQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plumbing-proxysql
spec:
  strategy:
    type: Recreate # 💡 기존 파드를 완전히 종료한 후 새 파드를 생성 (PVC Lock 충돌 완벽 방지)
  replicas: 1 # 💡 데이터 충돌 방지를 위해 단일 파드로 운영하며, K8s 자동 복구(Self-Healing) 활용
  selector:
    matchLabels:
      app: plumbing-proxysql
  template:
    metadata:
      labels:
        app: plumbing-proxysql
    spec:
      # 💡 [핵심 방어 1] NFS 볼륨 마운트 시 권한 문제(Permission Denied)로 인한 CrashLoop 방지
      initContainers:
        - name: fix-nfs-permissions
          image: busybox
          command: ["sh", "-c", "chmod -R 777 /var/lib/proxysql"]
          volumeMounts:
            - name: proxysql-data
              mountPath: /var/lib/proxysql
      containers:
        - name: proxysql
          image: proxysql/proxysql:latest
          ports:
            - containerPort: 6032
            - containerPort: 6033
          volumeMounts:
            - name: proxysql-data
              mountPath: /var/lib/proxysql
      volumes:
        - name: proxysql-data
          persistentVolumeClaim:
            claimName: proxysql-pvc
---
# 3. DB Service (ProxySQL 연결)
apiVersion: v1
kind: Service
metadata:
  name: plumbing-db-svc
spec:
  selector:
    app: plumbing-proxysql # 외부 Endpoints 대신 K8s 내부의 ProxySQL 파드를 바라보게 수정
  ports:
    - name: mysql
      port: 3306
      targetPort: 6033
    - name: proxysql-admin
      port: 6032
      targetPort: 6032
---
### 2. Backend (Node.js) ###
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plumbing-backend
spec:
  replicas: 2 # 💡 백엔드 컨테이너 2개로 스케일 아웃!
  selector:
    matchLabels:
      app: plumbing-backend
  template:
    metadata:
      labels:
        app: plumbing-backend
    spec:
      # 💡 [고가용성 극대화] 같은 백엔드 파드끼리는 서로 다른 노드(n1, n2)에 떨어지도록 스케줄링 유도
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: plumbing-backend
              topologyKey: kubernetes.io/hostname
      containers:
        - name: backend
          # 🚨 본인의 Docker Hub ID로 변경하세요!
          image: dajeongkim/plumbing-backend:latest
          imagePullPolicy: Always # 항상 최신 이미지를 가져오도록 설정
          resources:
            requests:
              cpu: 100m # 기준점: 평소에 0.1 코어(100m) 정도를 쓴다고 K8s에 신고
              memory: 128Mi
            limits:
              cpu: 500m # 최대 0.5 코어까지만 쓰도록 제한
              memory: 512Mi
          ports:
            - containerPort: 4000
          env:
            # 쿠버네티스 내부에서는 DB 서비스 이름(plumbing-db-svc)으로 통신합니다.
            - name: DB_HOST
              value: "plumbing-db-svc" 
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              value: "root"
            - name: DB_PASSWORD
              value: "8850"
            - name: DB_NAME
              value: "plumbing_db"
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15 # 파드 시작 후 15초 뒤부터 검사 시작g
            periodSeconds: 10       # 10초 주기로 검사
            timeoutSeconds: 3       # 3초 안에 응답이 없으면 실패로 간주
---
apiVersion: v1
kind: Service
metadata:
  name: plumbing-backend-svc
spec:
  selector:
    app: plumbing-backend
  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000

---
### 3. Frontend (Next.js) ###
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plumbing-frontend
spec:
  replicas: 2 # 💡 프론트엔드 컨테이너 2개로 스케일 아웃!
  selector:
    matchLabels:
      app: plumbing-frontend
  template:
    metadata:
      labels:
        app: plumbing-frontend
    spec:
      # 💡 [고가용성 극대화] 같은 프론트엔드 파드끼리는 서로 다른 노드(n1, n2)에 떨어지도록 스케줄링 유도
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: plumbing-frontend
              topologyKey: kubernetes.io/hostname
      containers:
        - name: frontend
          # 🚨 본인의 Docker Hub ID로 변경하세요!
          image: dajeongkim/plumbing-frontend:latest
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          ports:
            - containerPort: 3000
          env:
            # 프론트엔드 컨테이너 내부에서 백엔드 서비스로 접근할 주소 (Kubernetes 내부 서비스 이름)
            - name: INTERNAL_API_URL
              value: "http://plumbing-backend-svc:4000"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: plumbing-frontend-svc
spec:
  selector:
    app: plumbing-frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000

---
### 4. Ingress (프론트/백엔드 단일 진입점) ###
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: plumbing-ingress
  annotations:
    # 💡 HTTP로 접속해도 자동으로 HTTPS로 리다이렉트 시키는 설정
    nginx.ingress.kubernetes.io/ssl-redirect: "true" 
spec:
  ingressClassName: nginx # Nginx Ingress Controller를 사용하는 경우
  # 💡 TLS 인증서 적용 영역 추가
  tls:
  - hosts:
    - www.plumbing.local
    secretName: plumbing-tls-secret
  rules:
    - host: www.plumbing.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: plumbing-backend-svc
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: plumbing-frontend-svc
                port:
                  number: 3000
---
# 5. Grafana Ingress (그라파나 도메인 연결)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring # 💡 그라파나가 설치된 네임스페이스
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false" # 그라파나는 순수 HTTP 80 포트로 우선 노출
spec:
  ingressClassName: nginx
  rules:
    - host: grafana.plumbing.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monitoring-grafana
                port:
                  number: 80
---
# 💡 6. 백엔드 오토스케일링 (HPA)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: plumbing-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: plumbing-backend
  minReplicas: 2 # 최소 2개 유지 (고가용성 방어)
  maxReplicas: 10 # 트래픽 폭주 시 최대 10개까지 자동 확장
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70 # CPU 사용률이 70%를 넘기면 스케일 아웃 시작
---
# 💡 7. 프론트엔드 오토스케일링 (HPA)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: plumbing-frontend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: plumbing-frontend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70