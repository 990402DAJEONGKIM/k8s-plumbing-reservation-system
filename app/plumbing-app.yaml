# 1. ProxySQL PVC (영구 볼륨)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: proxysql-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
# 2. ProxySQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plumbing-proxysql
spec:
  replicas: 1 # 💡 데이터 충돌 방지를 위해 단일 파드로 운영하며, K8s 자동 복구(Self-Healing) 활용
  selector:
    matchLabels:
      app: plumbing-proxysql
  template:
    metadata:
      labels:
        app: plumbing-proxysql
    spec:
      containers:
        - name: proxysql
          image: proxysql/proxysql:latest
          ports:
            - containerPort: 6032
            - containerPort: 6033
          volumeMounts:
            - name: proxysql-data
              mountPath: /var/lib/proxysql
      volumes:
        - name: proxysql-data
          persistentVolumeClaim:
            claimName: proxysql-pvc
---
# 3. DB Service (ProxySQL 연결)
apiVersion: v1
kind: Service
metadata:
  name: plumbing-db-svc
spec:
  selector:
    app: plumbing-proxysql # 외부 Endpoints 대신 K8s 내부의 ProxySQL 파드를 바라보게 수정
  ports:
    - port: 3306
      targetPort: 6033
---
### 2. Backend (Node.js) ###
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plumbing-backend
spec:
  replicas: 2 # 💡 백엔드 컨테이너 2개로 스케일 아웃!
  selector:
    matchLabels:
      app: plumbing-backend
  template:
    metadata:
      labels:
        app: plumbing-backend
    spec:
      containers:
        - name: backend
          # 🚨 본인의 Docker Hub ID로 변경하세요!
          image: dajeongkim/plumbing-backend:latest
          imagePullPolicy: Always # 항상 최신 이미지를 가져오도록 설정
          ports:
            - containerPort: 4000
          env:
            # 쿠버네티스 내부에서는 DB 서비스 이름(plumbing-db-svc)으로 통신합니다.
            - name: DB_HOST
              value: "plumbing-db-svc" 
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              value: "root"
            - name: DB_PASSWORD
              value: "8850"
            - name: DB_NAME
              value: "plumbing_db"
---
apiVersion: v1
kind: Service
metadata:
  name: plumbing-backend-svc
spec:
  selector:
    app: plumbing-backend
  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000

---
### 3. Frontend (Next.js) ###
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plumbing-frontend
spec:
  replicas: 2 # 💡 프론트엔드 컨테이너 2개로 스케일 아웃!
  selector:
    matchLabels:
      app: plumbing-frontend
  template:
    metadata:
      labels:
        app: plumbing-frontend
    spec:
      containers:
        - name: frontend
          # 🚨 본인의 Docker Hub ID로 변경하세요!
          image: dajeongkim/plumbing-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            # 프론트엔드 컨테이너 내부에서 백엔드 서비스로 접근할 주소 (Kubernetes 내부 서비스 이름)
            - name: INTERNAL_API_URL
              value: "http://plumbing-backend-svc:4000"
---
apiVersion: v1
kind: Service
metadata:
  name: plumbing-frontend-svc
spec:
  selector:
    app: plumbing-frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000

---
### 4. Ingress (프론트/백엔드 단일 진입점) ###
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: plumbing-ingress
  annotations:
    # 💡 HTTP로 접속해도 자동으로 HTTPS로 리다이렉트 시키는 설정
    nginx.ingress.kubernetes.io/ssl-redirect: "true" 
spec:
  ingressClassName: nginx # Nginx Ingress Controller를 사용하는 경우
  # 💡 TLS 인증서 적용 영역 추가
  tls:
  - hosts:
    - www.plumbing.local
    secretName: plumbing-tls-secret
  rules:
    - host: www.plumbing.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: plumbing-backend-svc
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: plumbing-frontend-svc
                port:
                  number: 3000