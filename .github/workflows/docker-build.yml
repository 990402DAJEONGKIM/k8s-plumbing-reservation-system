name: Build and Push Docker Images

on:
  push:
    branches: [ "main", "master" ] # main 또는 master 브랜치에 푸시될 때마다 실행

jobs:
  build_and_push: # Job 이름을 더 명확하게 변경
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend
          file: ./app/backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/plumbing-backend:latest
          provenance: false # 💡 Docker Hub와 K8s의 SHA 해시값이 다르게 보이는 현상 방지
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/plumbing-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/plumbing-backend:buildcache,mode=max

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          file: ./app/frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/plumbing-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://www.plumbing.local
            NEXT_PUBLIC_GRAFANA_URL=https://grafana.plumbing.local
            NEXT_PUBLIC_ORCHESTRATOR_URL=http://orchestrator.plumbing.local
          provenance: false # 💡 Docker Hub와 K8s의 SHA 해시값이 다르게 보이는 현상 방지
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/plumbing-frontend:buildcache

          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/plumbing-frontend:buildcache,mode=max

  deploy: # 새로운 배포 Job 추가
    runs-on: self-hosted # 💡 self-hosted runner 사용
    needs: build_and_push # build_and_push Job이 성공해야 실행

    steps:
      - name: Set up Kubeconfig
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
        id: install

      - name: Configure Kubeconfig
        run: |
          set -e # 이 스텝에서 명령 실패 시 즉시 종료
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config
          
          echo "Kubeconfig 설정 완료. kubectl 연결 및 권한 확인 중..." # kubectl 클라이언트 버전 확인
          kubectl version --client
          # default 네임스페이스의 디플로이먼트 목록을 가져와 연결 및 권한 확인
          # 만약 다른 네임스페이스를 사용한다면 -n 옵션을 변경하세요.
          kubectl get deployments -n default
          echo "Kubernetes 클러스터 연결 및 권한 확인 성공."

      - name: Deploy to Kubernetes
        run: |
          set -e # 이 스텝에서 명령 실패 시 즉시 종료
          
          echo "K8s 매니페스트(YAML) 최신 설정 적용 중..."
          kubectl apply -f app/plumbing-app.yaml

          echo "모니터링 전체 설정(Grafana, Alertmanager, Rules) 적용 중..."
          cat <<EOF > monitoring-values.yaml
          grafana:
            grafana.ini:
              auth.anonymous:
                enabled: true
                org_name: Main Org.
                org_role: Viewer
          prometheus:
            prometheusSpec:
              serviceMonitorSelectorNilUsesHelmValues: false
              serviceMonitorSelector: {}
              scrapeInterval: 15s # 💡 프로메테우스가 데이터를 수집하는 기본 주기 15초로 단축
              evaluationInterval: 15s # 💡 프로메테우스가 알람 규칙을 검사하는 주기 15초로 단축
              additionalScrapeConfigs:
                - job_name: 'vmware-nodes'
                  static_configs:
                    - targets: 
                      - '172.16.0.7:9100'
                      - '172.16.0.8:9100'
                      - '172.16.0.2:9100' 
                      - '172.16.0.9:9100' 
                      - '172.16.0.3:9100' 
          alertmanager:
            config:
              global:
                resolve_timeout: 1m
              route:
                receiver: 'infra-test' # 💡 기본 수신처 (아래 설정한 name과 똑같이 맞춤)
                group_by: ['alertname']
                group_wait: 10s # 💡 알람 최초 발생 시 10초만 대기 후 즉시 발송
                group_interval: 15s # 💡 알람 업데이트/해결 시 15초 간격으로 즉시 갱신
                routes:
                  - matchers:
                      - severity="critical"
                    receiver: 'Slackbot' # 💡 Critical 에러 발생 시 라우팅 (아래 설정한 name과 똑같이 맞춤)
                    continue: true # 💡 true로 두면 DM도 보내고, 기본 채널로도 보냅니다. (DM만 받으려면 지우세요)
              inhibit_rules:
                - source_matchers:
                    - alertname="InstanceDown"
                  target_matchers:
                    - alertname="DiskSpaceFull"
                  equal: ['instance']
              receivers:
                - name: 'infra-test'
                  slack_configs:
                    - api_url: 'https://hooks.slack.com/services/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' # 🚨 1번 채널용 웹훅
                      send_resolved: true
                      title: '{{ if eq .Status "firing" }}🚨 [FIRING]{{ else }}✅ [RESOLVED]{{ end }} {{ .GroupLabels.alertname }}'
                      text: |-
                        {{ range .Alerts }}
                        {{ if eq .Status "firing" }}
                        *상세 내용:* {{ .Annotations.description }}
                        {{ else }}
                        *상세 내용:* 🟢 시스템이 정상 상태로 복구되었습니다.
                        {{ end }}
                        *대상 서버:* {{ .Labels.instance }}
                        {{ end }}
                      actions:
                        - type: button
                          text: '🛠️ 관리자 대시보드 접속'
                          url: 'https://www.plumbing.local/admin'
                - name: 'Slackbot'
                  slack_configs:
                    - api_url: 'https://hooks.slack.com/services/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' # 🚨 2번 담당자DM용 웹훅
                      send_resolved: true
                      title: '{{ if eq .Status "firing" }}🔥 [FATAL ERROR]{{ else }}✅ [RESOLVED]{{ end }} {{ .GroupLabels.alertname }}'
                      text: |-
                        {{ range .Alerts }}
                        {{ if eq .Status "firing" }}
                        *상세 내용:* {{ .Annotations.description }}
                        {{ else }}
                        *상세 내용:* 🟢 시스템이 정상 상태로 복구되었습니다.
                        {{ end }}
                        *대상 서버:* {{ .Labels.instance }}
                        {{ end }}
                      actions:
                        - type: button
                          text: '🛠️ 관리자 대시보드 접속'
                          url: 'https://www.plumbing.local/admin'
          additionalPrometheusRulesMap:
            custom-alerts:
              groups:
                - name: custom-alerts
                  rules:
                    - alert: HighTrafficSpike
                      expr: sum(rate(mysql_global_status_queries[1m])) > 30
                      for: 1m
                      labels:
                        severity: warning
                      annotations:
                        description: "웹사이트 트래픽이 폭주하여 DB 쿼리량이 30 QPS를 초과했습니다! (현재: {{ \$value | humanize }} QPS)"
                    - alert: DatabaseNodeDown
                      expr: mysql_up == 0
                      for: 15s
                      labels:
                        severity: critical
                      annotations:
                        description: "데이터베이스 노드가 응답하지 않습니다! Failover 상태를 확인하세요."
                    - alert: InstanceDown
                      expr: up == 0
                      for: 15s
                      labels:
                        severity: critical
                      annotations:
                        description: "서버 노드({{ \$labels.instance }})가 응답하지 않습니다! 장비가 다운되었거나 네트워크가 끊어졌습니다."
                    - alert: DiskSpaceFull
                      expr: 100 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} * 100) > 90
                      for: 5m
                      labels:
                        severity: critical
                      annotations:
                        description: "서버 노드({{ \$labels.instance }})의 디스크 사용량이 90%를 초과했습니다! (현재: {{ \$value | humanize }}%) 즉시 용량을 확보하세요."
          EOF
          
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          
          # 💡 실무 적용 1: 네트워크 지연 방지를 위한 자동 재시도(Retry) 로직
          for i in 1 2 3; do
            helm repo update && break || (echo "Repo update failed, retrying in 10s..." && sleep 10)
          done
          
          # 💡 실무 적용 2: 일시적 다운로드 실패 대응 (최대 3회 재시도)
          for i in 1 2 3; do
            helm upgrade monitoring prometheus-community/kube-prometheus-stack --namespace monitoring --reuse-values -f monitoring-values.yaml && break || (echo "Helm upgrade failed, retrying in 15s..." && sleep 15)
          done

          echo "MySQL Exporter (Master & Slave) 설정 및 자동 배포 진행 중..."
          cat <<EOF > mysql-master-values.yaml
          mysql:
            user: "exporter"
            pass: "exporter_pass_123"
            host: "172.16.0.7"
            port: 3306
            db: "?tls=false"
          serviceMonitor:
            enabled: true
            namespace: monitoring
            interval: 15s
            scrapeTimeout: 10s
            additionalLabels:
              release: monitoring
            relabelings:
              - targetLabel: instance
                replacement: "172.16.0.7:3306"
          EOF
          
          cat <<EOF > mysql-slave-values.yaml
          mysql:
            user: "exporter"
            pass: "exporter_pass_123"
            host: "172.16.0.8"
            port: 3306
            db: "?tls=false"
          serviceMonitor:
            enabled: true
            namespace: monitoring
            interval: 15s
            scrapeTimeout: 10s
            additionalLabels:
              release: monitoring
            relabelings:
              - targetLabel: instance
                replacement: "172.16.0.8:3306"
          EOF
          
          helm upgrade --install mysql-exporter-master prometheus-community/prometheus-mysql-exporter --namespace monitoring -f mysql-master-values.yaml
          helm upgrade --install mysql-exporter-slave prometheus-community/prometheus-mysql-exporter --namespace monitoring -f mysql-slave-values.yaml

          echo "ProxySQL 파드 실행 완료 대기 중..."
          kubectl rollout status deployment plumbing-proxysql

          echo "ProxySQL 자동 초기 설정 진행 중..."
          # 실행 중인 ProxySQL 파드의 이름을 가져옴
          POD_NAME=$(kubectl get pods -l app=plumbing-proxysql -o jsonpath='{.items[0].metadata.name}')
          
          # 파드 내부로 접속하여 설정 쿼리를 즉시 실행 (멱등성 보장: 여러 번 실행해도 안전함)
          kubectl exec $POD_NAME -- mysql -u admin -padmin -h 127.0.0.1 -P 6032 -e "
            DELETE FROM mysql_servers;
            # 💡 Replication Hostgroup 사용 시, 서버를 한 번만 등록해두면 ProxySQL이 read_only 값을 보고 10(Writer)과 20(Reader) 사이를 알아서 이동시킵니다.
            INSERT INTO mysql_servers(hostgroup_id, hostname, port) VALUES (10, '172.16.0.7', 3306); # 현재 마스터
            INSERT INTO mysql_servers(hostgroup_id, hostname, port) VALUES (20, '172.16.0.8', 3306); # 현재 리플리카
            UPDATE mysql_servers SET status = 'ONLINE';
            
            # 💡 Read-Only 기반 자동 라우팅 활성화 (10번은 Writer, 20번은 Reader)
            DELETE FROM mysql_replication_hostgroups;
            INSERT INTO mysql_replication_hostgroups (writer_hostgroup, reader_hostgroup, comment) VALUES (10, 20, 'Master-Slave HA');
            
            DELETE FROM mysql_users;
            INSERT INTO mysql_users(username, password, default_hostgroup) VALUES ('root', '8850', 10);
            UPDATE global_variables SET variable_value='monitor_user' WHERE variable_name='mysql-monitor_username';
            UPDATE global_variables SET variable_value='monitor_password' WHERE variable_name='mysql-monitor_password';
            UPDATE global_variables SET variable_value='2000' WHERE variable_name='mysql-monitor_ping_interval';
            UPDATE global_variables SET variable_value='100000' WHERE variable_name='mysql-max_connections_errors';
            UPDATE global_variables SET variable_value='5' WHERE variable_name='mysql-shun_recovery_time_sec';
            DELETE FROM mysql_query_rules;
            INSERT INTO mysql_query_rules (rule_id, active, match_digest, destination_hostgroup, apply) VALUES (1, 1, '^SELECT.*FOR UPDATE$', 10, 1);
            INSERT INTO mysql_query_rules (rule_id, active, match_digest, destination_hostgroup, cache_ttl, apply) VALUES (2, 1, '^SELECT', 20, 3600000, 1);
            INSERT INTO mysql_query_rules (rule_id, active, match_digest, destination_hostgroup, apply) VALUES (3, 1, '.*', 10, 1);
            LOAD MYSQL SERVERS TO RUNTIME; SAVE MYSQL SERVERS TO DISK;
            LOAD MYSQL USERS TO RUNTIME; SAVE MYSQL USERS TO DISK;
            LOAD MYSQL VARIABLES TO RUNTIME; SAVE MYSQL VARIABLES TO DISK;
            LOAD MYSQL QUERY RULES TO RUNTIME; SAVE MYSQL QUERY RULES TO DISK;
          "
          echo "ProxySQL 설정 완료!"

          echo "MySQL Exporter 모니터링 전용 DB 계정 자동 생성 중..."
          # 💡 [Failover 대응] 172.16.0.7이 Read-Only(Slave) 상태로 전환되었을 경우를 대비하여
          # 실패 시 172.16.0.8(새 Master)에 계정 생성을 시도하고, 그래도 실패하면 파이프라인이 멈추지 않게 방어
          (kubectl exec $POD_NAME -- mysql -u root -p8850 -h 172.16.0.7 -P 3306 --skip-ssl -e "
            DROP USER IF EXISTS 'exporter'@'%';
            CREATE USER 'exporter'@'%' IDENTIFIED WITH mysql_native_password BY 'exporter_pass_123';
            GRANT PROCESS, REPLICATION CLIENT, SELECT ON *.* TO 'exporter'@'%';
            FLUSH PRIVILEGES;
          ") || (kubectl exec $POD_NAME -- mysql -u root -p8850 -h 172.16.0.8 -P 3306 --skip-ssl -e "
            DROP USER IF EXISTS 'exporter'@'%';
            CREATE USER 'exporter'@'%' IDENTIFIED WITH mysql_native_password BY 'exporter_pass_123';
            GRANT PROCESS, REPLICATION CLIENT, SELECT ON *.* TO 'exporter'@'%';
            FLUSH PRIVILEGES;
          ") || echo "⚠️ DB 계정 생성 건너뜀 (이미 생성되었거나 양쪽 모두 Read-Only 상태입니다.)"

          echo "Orchestrator DB 관제 계정 자동 생성 중..."
          (kubectl exec $POD_NAME -- mysql -u root -p8850 -h 172.16.0.7 -P 3306 --skip-ssl -e "
            CREATE USER IF NOT EXISTS 'orchestrator_user'@'%' IDENTIFIED BY 'orch_password_123';
            GRANT SUPER, PROCESS, REPLICATION SLAVE, REPLICATION CLIENT, RELOAD ON *.* TO 'orchestrator_user'@'%';
            GRANT SELECT, INSERT, UPDATE, DELETE ON mysql.slave_master_info TO 'orchestrator_user'@'%';
            FLUSH PRIVILEGES;
          ") || (kubectl exec $POD_NAME -- mysql -u root -p8850 -h 172.16.0.8 -P 3306 --skip-ssl -e "
            CREATE USER IF NOT EXISTS 'orchestrator_user'@'%' IDENTIFIED BY 'orch_password_123';
            GRANT SUPER, PROCESS, REPLICATION SLAVE, REPLICATION CLIENT, RELOAD ON *.* TO 'orchestrator_user'@'%';
            GRANT SELECT, INSERT, UPDATE, DELETE ON mysql.slave_master_info TO 'orchestrator_user'@'%';
            FLUSH PRIVILEGES;
          ") || echo "⚠️ Orchestrator 계정 생성 건너뜀"

          echo "Orchestrator (Auto-Failover) 및 Ingress 매니페스트 적용 중..."
          echo "ProxySQL 모니터링 전용 DB 계정 자동 생성 중 (monitor_user)..."
          # 현재 마스터인 172.16.0.8에 먼저 시도하고, 실패 시 172.16.0.7에 시도
          (kubectl exec $POD_NAME -- mysql -u root -p8850 -h 172.16.0.8 -P 3306 --skip-ssl -e "
            CREATE USER IF NOT EXISTS 'monitor_user'@'%' IDENTIFIED BY 'monitor_password';
            GRANT USAGE ON *.* TO 'monitor_user'@'%';
            GRANT SELECT ON performance_schema.* TO 'monitor_user'@'%';
            GRANT SELECT ON sys.* TO 'monitor_user'@'%';
            FLUSH PRIVILEGES;
          ") || (kubectl exec $POD_NAME -- mysql -u root -p8850 -h 172.16.0.7 -P 3306 --skip-ssl -e "
            CREATE USER IF NOT EXISTS 'monitor_user'@'%' IDENTIFIED BY 'monitor_password';
            GRANT USAGE ON *.* TO 'monitor_user'@'%';
            GRANT SELECT ON performance_schema.* TO 'monitor_user'@'%';
            GRANT SELECT ON sys.* TO 'monitor_user'@'%';
            FLUSH PRIVILEGES;
          ") || echo "⚠️ monitor_user 계정 생성 건너뜀"

          echo "Orchestrator (Auto-Failover) 및 Ingress 매니페스트 적용 중..."
          cat <<EOF > orchestrator-app.yaml
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: orchestrator-config
            namespace: default
          data:
            orchestrator.conf.json: |
              {
                "ListenAddress": ":3000",
                "BackendDB": "sqlite",
                "SQLite3DataFile": "/var/lib/orchestrator/orchestrator.sqlite3",
                "MySQLTopologyUser": "orchestrator_user",
                "MySQLTopologyPassword": "orch_password_123",
                "MySQLTopologySSLSkipVerify": true,
                "MySQLTopologySSLMode": "disabled",
                "DiscoverByShowSlaveHosts": true,
                "InstancePollSeconds": 5,
                "RecoverMasterClusterFilters": ["*"],
                "RecoverIntermediateMasterClusterFilters": ["*"],
                "ApplyMySQLPromotionAfterMasterFailover": true,
                "PreventCrossDataCenterMasterFailover": false,
                "FailMasterPromotionIfSQLThreadNotUpToDate": true,
                "DelayMasterPromotionIfSQLThreadNotUpToDate": false }
          ---
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: orchestrator-pvc
            namespace: default
          spec:
            storageClassName: nfs-client
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: plumbing-orchestrator
            namespace: default
          spec:
            strategy:
              type: Recreate # 💡 기존 파드를 완전히 종료한 후 새 파드를 생성 (PVC Lock 충돌 완벽 방지)
            replicas: 1
            selector:
              matchLabels:
                app: orchestrator
            template:
              metadata:
                labels:
                  app: orchestrator
                annotations: # ConfigMap 내용 변경 시 파드 재시작을 강제하는 어노테이션 추가
                  checksum/config: $(echo '{ "ListenAddress": ":3000", "BackendDB": "sqlite", "SQLite3DataFile": "/var/lib/orchestrator/orchestrator.sqlite3", "MySQLTopologyUser": "orchestrator_user", "MySQLTopologyPassword": "orch_password_123", "MySQLTopologySSLSkipVerify": true, "MySQLTopologySSLMode": "disabled", "DiscoverByShowSlaveHosts": true, "InstancePollSeconds": 5, "RecoverMasterClusterFilters": ["*"], "RecoverIntermediateMasterClusterFilters": ["*"], "ApplyMySQLPromotionAfterMasterFailover": true, "PreventCrossDataCenterMasterFailover": false, "FailMasterPromotionIfSQLThreadNotUpToDate": true, "DelayMasterPromotionIfSQLThreadNotUpToDate": false }' | sha256sum | awk '{print $1}')
              spec:
                # 💡 [핵심 방어 1] NFS 볼륨 마운트 시 권한 문제(Permission Denied) 방지
                initContainers:
                - name: fix-nfs-permissions
                  image: busybox
                  command: ["sh", "-c", "chmod -R 777 /var/lib/orchestrator"]
                  volumeMounts:
                  - name: data-volume
                    mountPath: /var/lib/orchestrator
                containers:
                - name: orchestrator
                  # 💡 위에서 직접 빌드해서 내 저장소에 올린 이미지를 사용!
                  image: ${{ secrets.DOCKERHUB_USERNAME }}/plumbing-orchestrator:latest
                  ports:
                  - containerPort: 3000
                  volumeMounts:
                  - name: config-volume
                    mountPath: /etc/orchestrator.conf.json
                    subPath: orchestrator.conf.json
                  - name: data-volume
                    mountPath: /var/lib/orchestrator
                volumes:
                - name: config-volume
                  configMap:
                    name: orchestrator-config
                - name: data-volume
                  persistentVolumeClaim:
                    claimName: orchestrator-pvc
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: orchestrator-svc
            namespace: default
          spec:
            selector:
              app: orchestrator
            ports:
            - port: 3000
              targetPort: 3000
          ---
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: orchestrator-ingress
            namespace: default
            annotations:
              nginx.ingress.kubernetes.io/proxy-body-size: "50m"
          spec:
            ingressClassName: nginx
            rules:
            - host: orchestrator.plumbing.local
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: orchestrator-svc
                      port:
                        number: 3000
          EOF
          cat <<EOF >> orchestrator-app.yaml # Append to the existing orchestrator-app.yaml
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: mysql-s
            namespace: default
          spec:
            ports:
              - protocol: TCP
                port: 3306
                targetPort: 3306
          ---
          apiVersion: v1
          kind: Endpoints
          metadata:
            name: mysql-s
            namespace: default
          subsets:
            - addresses:
                - ip: 172.16.0.8
              ports:
                - port: 3306
          EOF
          kubectl apply -f orchestrator-app.yaml

          echo "plumbing-proxysql 디플로이먼트 롤아웃 재시작 시작..."
          kubectl rollout restart deployment plumbing-proxysql
          echo "plumbing-proxysql 롤아웃 완료 대기 중..."
          kubectl rollout status deployment plumbing-proxysql
          echo "plumbing-orchestrator 디플로이먼트 롤아웃 재시작 시작..."
          kubectl rollout restart deployment plumbing-orchestrator
          echo "plumbing-orchestrator 롤아웃 완료 대기 중..."
          kubectl rollout status deployment plumbing-orchestrator

          echo "데이터베이스 자동 백업 CronJob(NFS 연동) 매니페스트 적용 중..."
          cat <<EOF > db-backup-cronjob.yaml
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: db-backup-pvc
            namespace: default
          spec:
            storageClassName: nfs-client
            accessModes:
              - ReadWriteMany
            resources:
              requests:
                storage: 5Gi
          ---
          apiVersion: batch/v1
          kind: CronJob
          metadata:
            name: db-backup-cronjob
            namespace: default
          spec:
            schedule: "0 19 * * *" # 💡 UTC 19:00 = 한국 시간(KST) 새벽 4시
            concurrencyPolicy: Forbid
            successfulJobsHistoryLimit: 3
            failedJobsHistoryLimit: 1
            jobTemplate:
              spec:
                template:
                  spec:
                    containers:
                    - name: backup-container
                      image: mysql:8.0
                      command: ["/bin/sh", "-c"]
                      args:
                        - |
                          echo "데이터베이스 백업 시작..."
                          DATE=\$(date +%Y%m%d_%H%M%S)
                          mysqldump -h 172.16.0.7 -u root -p8850 --set-gtid-purged=OFF plumbing_db > /mnt/nfs_backup/plumbing_db_\$DATE.sql
                          echo "백업 완료: /mnt/nfs_backup/plumbing_db_\$DATE.sql"
                          find /mnt/nfs_backup -name "plumbing_db_*.sql" -type f -mtime +7 -exec rm {} \;
                          echo "7일이 지난 오래된 백업 파일 정리 완료."
                      volumeMounts:
                      - name: backup-volume
                        mountPath: /mnt/nfs_backup
                    restartPolicy: OnFailure
                    volumes:
                    - name: backup-volume
                      persistentVolumeClaim:
                        claimName: db-backup-pvc
          EOF
          kubectl apply -f db-backup-cronjob.yaml

          echo "Docker Hub에서 최신 이미지 풀링을 위해 Deployment 재시작..."
          echo "plumbing-backend 디플로이먼트 롤아웃 재시작 시작..."
          kubectl rollout restart deployment plumbing-backend
          echo "plumbing-frontend 디플로이먼트 롤아웃 재시작 시작..."
          kubectl rollout restart deployment plumbing-frontend
          echo "plumbing-frontend 롤아웃 완료 대기 중..."
          kubectl rollout status deployment plumbing-frontend
          echo "배포 완료!"